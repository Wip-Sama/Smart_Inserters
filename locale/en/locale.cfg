[mod-setting-description]
si-inserters-chase-belt-items=Inserters will follow vanilla rules and chase moving items on belts.\n[color=red][font=default-bold]Warning:[/font] This can cause UPS problems. Suggested = false.[/color]
si-range-adder=Controls how inserter distances scale and how the "Max inserters range" setting is applied.\n\n[font=default-bold][color=orange]"Inserter"[/color][/font]\nMax reach is locked to their vanilla default range. (The Max Range setting is ignored). They can still reach closer than their default.\n\n[font=default-bold][color=orange]"Incremental"[/color][/font]\nThe Max Range setting acts as a [color=green]bonus increment[/color] added to their vanilla default range. (e.g. A long-handed inserter reaches further than a standard one).\n\n[font=default-bold][color=orange]"Equal"[/color][/font]\nAll inserters share the exact same max reach, defined by the Max Range setting.\n\n[font=default-bold][color=orange]"Rebase"[/color][/font]\nLike "Equal", but their [color=red]minimum reach[/color] is restricted to their vanilla default range. (e.g. A long-handed inserter cannot grab from 1 tile away).\n\n[font=default-bold][color=orange]"Incremental-with-Rebase"[/color][/font]\nCombines Incremental and Rebase. Max reach gets a bonus, but minimum reach is restricted to their vanilla default.\n\n[font=default-bold][color=orange]"Inserter-with-Rebase"[/color][/font]\nReach distance is strictly locked to their vanilla default range. They cannot reach further or closer.
si-max-inserters-range=Sets the absolute maximum reach (1-6 tiles) for any inserter.\n[color=green]Suggested = 3[/color]
si-disable-long-inserters=Hides the recipes and disables crafting for all vanilla long-handed inserters.
si-directional-inserters=Forces inserters to only pick up from one side and drop on the exactly opposite side.
si-single-line-inserters=Prevents inserters from dropping items diagonally (forces straight lines only).
si-directional-slim-inserters=Forces slim inserters to only pick up from one side and drop on the exactly opposite side.
si-single-line-slim-inserters=Prevents slim inserters from dropping items diagonally.
si-diagonal-technologies=Enables the diagonal tech tree.\n[color=yellow]Note: Without level 1, inserter positions cannot be edited.[/color]
si-range-technologies=Enables the range tech tree.\n[color=yellow]Note: Without level 1, inserter positions cannot be edited.[/color]
si-offset-technologies=Enables the offset tech tree (allowing micro-adjustments).
si-offset-selector=Toggles whether the pickup/drop offset UI is visible in the configurator.
si-technologies-difficulty=Selects the cost multiplier and difficulty of the Smart Inserter technology tree.
si-disable-inserters-consumption=Disables power consumption for all inserters completely.
si-swap-clicks=Swaps the left and right mouse button behaviors when configuring positions directly in the world.

