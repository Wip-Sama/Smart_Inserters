si-pickup-offset-tooltip=[font=default-bold][color=green]Copies the pickup micro-offset.[/color][/font]\nCopies the precise fractional position inside the pickup tile.
si-si-direction=Facing Direction
si-si-direction-tooltip=[font=default-bold][color=yellow]Copies the physical base orientation.[/color][/font]\nForces the destination inserter to point its physical base in the exact same absolute direction as the source inserter.
si-relative-si-direction=Relative Orientation
si-relative-si-direction-tooltip=[font=default-bold][color=yellow]Preserves positions relative to the base.[/color][/font]\nWhen checked (Vanilla behavior), positions are applied [font=default-bold]relative to the inserter's base[/font].\nWhen unchecked, positions are treated as absolute directional offsets (e.g. if the source dropped North, the destination will also drop North, regardless of where its base points).

