[mod-setting-description]
si-inserters-chase-belt-items=Gli inseritori seguiranno il comportamento vanilla e inseguiranno gli oggetti sui nastri.\n[color=red][font=default-bold]Attenzione:[/font] Questo può causare problemi di UPS. Suggerito = falso.[/color]
si-range-adder=Controlla come si scala la portata degli inseritori e come viene applicata l'impostazione "Distanza massima".\n\n[font=default-bold][color=orange]"Inseritore"[/color][/font]\nLa portata massima è bloccata alla loro portata vanilla predefinita. (L'impostazione Distanza massima viene ignorata). Possono comunque raggiungere posizioni più vicine.\n\n[font=default-bold][color=orange]"Incrementale"[/color][/font]\nL'impostazione Distanza massima agisce come un [color=green]incremento bonus[/color] aggiunto alla loro portata vanilla predefinita. (es. Un inseritore lungo raggiungerà sempre una distanza maggiore di uno standard).\n\n[font=default-bold][color=orange]"Uguale"[/color][/font]\nTutti gli inseritori condividono esattamente la stessa portata massima, definita dall'impostazione Distanza massima.\n\n[font=default-bold][color=orange]"Rebase"[/color][/font]\nCome "Uguale", ma la loro [color=red]portata minima[/color] è limitata alla loro portata vanilla predefinita. (es. Un inseritore lungo non può raccogliere a 1 casella di distanza).\n\n[font=default-bold][color=orange]"Incrementale con Rebase"[/color][/font]\nCombina Incrementale e Rebase. La portata massima ottiene un bonus, ma la portata minima è limitata al default vanilla.\n\n[font=default-bold][color=orange]"Inseritore con Rebase"[/color][/font]\nLa portata è rigorosamente bloccata alla loro portata vanilla predefinita. Non possono raggiungere posizioni né più lontane né più vicine.
si-max-inserters-range=Imposta la portata massima assoluta (1-6 caselle) per qualsiasi inseritore.\n[color=green]Suggerito = 3[/color]
si-disable-long-inserters=Nasconde le ricette e disabilita la creazione per tutti gli inseritori lunghi vanilla.
si-directional-inserters=Obbliga gli inseritori a prendere oggetti da un solo lato e posarli sul lato esattamente opposto.
si-single-line-inserters=Impedisce agli inseritori di posare oggetti in diagonale (forza solo linee rette).
si-directional-slim-inserters=Obbliga gli inseritori sottili a prendere oggetti da un solo lato e posarli sul lato esattamente opposto.
si-single-line-slim-inserters=Impedisce agli inseritori sottili di posare oggetti in diagonale.
si-diagonal-technologies=Abilita l'albero di ricerca per le diagonali.\n[color=yellow]Nota: Senza il livello 1, le posizioni degli inseritori non possono essere modificate.[/color]
si-range-technologies=Abilita l'albero di ricerca per la portata.\n[color=yellow]Nota: Senza il livello 1, le posizioni degli inseritori non possono essere modificate.[/color]
si-offset-technologies=Abilita l'albero di ricerca per gli offset (consentendo micro-regolazioni).
si-offset-selector=Attiva o disattiva la visibilità della UI per l'offset di raccolta/rilascio nel configuratore.
si-technologies-difficulty=Seleziona il moltiplicatore di costo e la difficoltà dell'albero di ricerca degli Smart Inserters.
si-disable-inserters-consumption=Disabilita completamente il consumo di energia per tutti gli inseritori.
si-swap-clicks=Inverte il comportamento del tasto sinistro e destro del mouse quando configuri le posizioni direttamente nel mondo.

