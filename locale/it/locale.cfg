si-drop-offset-tooltip=[font=default-bold][color=orange]Copia il micro-offset di rilascio.[/color][/font]\nCopia l'esatta posizione frazionaria all'interno della casella di rilascio.
si-pickup=Posizione di Raccolta
si-pickup-tooltip=[font=default-bold][color=green]Copia la posizione di raccolta.[/color][/font]\nSe [color=yellow]Orientamento Relativo[/color] è attivato, la posizione incollata ruoterà automaticamente per corrispondere alla direzione della base di destinazione.
