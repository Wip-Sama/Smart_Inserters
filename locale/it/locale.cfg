si-pickup-offset-tooltip=[font=default-bold][color=green]Copia il micro-offset di raccolta.[/color][/font]\nCopia l'esatta posizione frazionaria all'interno della casella di raccolta.
si-si-direction=Direzione di Base
si-si-direction-tooltip=[font=default-bold][color=yellow]Copia l'orientamento fisico della base.[/color][/font]\nCostringe l'inseritore di destinazione a puntare la sua base fisica esattamente nella stessa direzione assoluta dell'inseritore sorgente.
si-relative-si-direction=Orientamento Relativo
si-relative-si-direction-tooltip=[font=default-bold][color=yellow]Preserva le posizioni relative alla base.[/color][/font]\nSe attivato (Comportamento Vanilla), le posizioni vengono applicate [font=default-bold]relativamente alla base dell'inseritore[/font].\nSe disattivato, le posizioni sono trattate come offset direzionali assoluti (es. se la sorgente rilasciava a Nord, anche la destinazione rilascerà a Nord, indipendentemente da dove punti la sua base).

