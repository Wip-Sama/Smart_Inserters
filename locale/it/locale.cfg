si-drop-tooltip=[font=default-bold][color=orange]Copia la posizione di rilascio.[/color][/font]\nSe [color=yellow]Orientamento Relativo[/color] è attivato, la posizione incollata ruoterà automaticamente per corrispondere alla direzione della base di destinazione.
